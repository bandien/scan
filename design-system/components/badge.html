<!-- @dsCard group="Badges & Status" -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --warn: #b7791f; --danger: #c2413b; --brand-2: #2d8a5f;
      --surface-soft: #eef6f4; --muted: #667085; --line: #d9e1e8;
    }
    body { background: #f6f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 20px; color: #17212f; }
    .badge-soft {
      border: 1px solid transparent; border-radius: 999px;
      padding: 5px 10px; font-weight: 700; font-size: .8rem; white-space: nowrap; display: inline-block;
    }
    .badge-high { background: #fff1f0; color: var(--danger); border-color: #ffd0cc; }
    .badge-mid  { background: #fff7df; color: var(--warn);   border-color: #ffe5a3; }
    .badge-low  { background: var(--surface-soft); color: var(--brand-2); border-color: #cbe7db; }
    .badge-open { background: #edf3f6; color: #475467; border-color: #d9e1e8; }
    .badge-doing{ background: #e8f3ff; color: #155ea8; border-color: #bddcff; }
    .badge-done { background: #e8f6ef; color: #1f7a4d; border-color: #bfe4cf; }
    .row-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
    .group { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="group">
    <div class="row-label">Mức ưu tiên</div>
    <div class="d-flex gap-2 flex-wrap">
      <span class="badge-soft badge-high">Cao</span>
      <span class="badge-soft badge-mid">Trung bình</span>
      <span class="badge-soft badge-low">Thấp</span>
    </div>
  </div>
  <div class="group">
    <div class="row-label">Trạng thái kế hoạch</div>
    <div class="d-flex gap-2 flex-wrap">
      <span class="badge-soft badge-open">Chưa làm</span>
      <span class="badge-soft badge-doing">Đang làm</span>
      <span class="badge-soft badge-done">Hoàn thành</span>
    </div>
  </div>
  <div class="group">
    <div class="row-label">Phân loại & Khối lượng</div>
    <div class="d-flex gap-2 flex-wrap">
      <span class="badge-soft badge-mid">Phát sinh</span>
      <span class="badge-soft badge-low"><i class="bi bi-sigma me-1"></i>42/140 m</span>
      <span class="badge-soft badge-open">KL 140 m</span>
    </div>
  </div>
  <div class="group">
    <div class="row-label">Đánh giá nhân viên</div>
    <div class="d-flex gap-2 flex-wrap">
      <span class="badge-soft badge-done"><i class="bi bi-star me-1"></i>Hoàn thành tốt</span>
      <span class="badge-soft badge-low"><i class="bi bi-star me-1"></i>Đạt</span>
      <span class="badge-soft badge-high"><i class="bi bi-star me-1"></i>Chưa đạt</span>
      <span class="badge-soft badge-open"><i class="bi bi-star me-1"></i>Vắng</span>
    </div>
  </div>
</body>
</html>
