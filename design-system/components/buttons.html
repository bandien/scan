<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --muted: #667085; }
    body { background: #f6f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 20px; color: #17212f; }
    .btn-icon { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
    .section-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
    .group { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="group">
    <div class="section-label">Primary actions</div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-success btn-lg" type="button"><i class="bi bi-check2-circle me-1"></i>Lưu nhật ký</button>
      <button class="btn btn-primary" type="button"><i class="bi bi-plus-lg me-1"></i>Thêm kế hoạch</button>
      <button class="btn btn-success fw-bold text-nowrap" type="button"><i class="bi bi-journal-plus me-1"></i>Ghi nhật ký</button>
      <button class="btn btn-primary" type="button"><i class="bi bi-check2-circle me-1"></i>Lưu kế hoạch</button>
    </div>
  </div>

  <div class="group">
    <div class="section-label">Secondary & utility</div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-primary" type="button"><i class="bi bi-arrow-clockwise me-1"></i>Nạp</button>
      <button class="btn btn-outline-secondary" type="button"><i class="bi bi-funnel me-1"></i>Lọc</button>
      <button class="btn btn-outline-secondary" type="button"><i class="bi bi-eraser me-1"></i>Xóa nội dung</button>
      <button class="btn btn-outline-primary w-100" style="max-width:200px;" type="button">Xem thêm (8)</button>
    </div>
  </div>

  <div class="group">
    <div class="section-label">Icon buttons (btn-icon)</div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-outline-secondary btn-icon" type="button" title="Ngày trước"><i class="bi bi-chevron-left"></i></button>
      <button class="btn btn-outline-secondary btn-icon" type="button" title="Ngày sau"><i class="bi bi-chevron-right"></i></button>
      <button class="btn btn-outline-secondary btn-icon" type="button" title="Cỡ chữ"><span class="fw-bold">A</span></button>
      <button class="btn btn-outline-secondary btn-icon" type="button" title="Sửa kế hoạch"><i class="bi bi-pencil"></i></button>
      <a class="btn btn-outline-primary btn-icon" href="#" title="Về trang chủ"><i class="bi bi-house"></i></a>
    </div>
  </div>

  <div class="group">
    <div class="section-label">Danger & warning</div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-outline-danger" type="button"><i class="bi bi-trash me-1"></i>Xóa</button>
      <button class="btn btn-warning fw-bold" type="button"><i class="bi bi-arrow-right-circle me-1"></i>Tiếp tục xử lý</button>
    </div>
  </div>

  <div class="group">
    <div class="section-label">View toggle (btn-group)</div>
    <div class="d-flex gap-2">
      <div class="btn-group" role="group">
        <button class="btn btn-outline-primary active" type="button">Ngày</button>
        <button class="btn btn-outline-primary" type="button">Tuần</button>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="section-label">Loading state</div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="button" disabled>
        <span class="spinner-border spinner-border-sm me-1"></span>Đang nạp...
      </button>
      <button class="btn btn-success" type="button" disabled>
        <span class="spinner-border spinner-border-sm me-1"></span>Đang lưu...
      </button>
    </div>
  </div>
</body>
</html>
