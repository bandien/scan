<!-- @dsCard group="Feedback" -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --muted: #667085; }
    body { background: #f6f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 20px; color: #17212f; }
    .empty-state { border: 1px dashed #b7c3cf; border-radius: 8px; padding: 28px 16px; text-align: center; color: var(--muted); background: #fbfcfe; }
    .section-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="section-label">Empty state — không có việc</div>
  <div class="empty-state mb-4">
    Không có việc cần xem.
  </div>

  <div class="section-label">Empty state — chưa có nhật ký</div>
  <div class="empty-state mb-4">
    Chưa có nhật ký gần đây.
  </div>

  <div class="section-label">Empty state — không có kế hoạch trong tuần</div>
  <div class="empty-state">
    <i class="bi bi-calendar-x fs-2 mb-2 d-block opacity-50"></i>
    Không có kế hoạch trong khoảng thời gian này.<br>
    <span class="small">Bấm <strong>+ Thêm kế hoạch</strong> để tạo mới.</span>
  </div>
</body>
</html>
