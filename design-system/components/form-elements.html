<!-- @dsCard group="Forms" -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --brand-2: #2d8a5f; --surface-soft: #eef6f4; --muted: #667085; }
    body { background: #f6f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 20px; color: #17212f; }
    .form-label { font-size: .78rem; font-weight: 700; color: #475467; }
    .form-control, .form-select { border-radius: 8px; border-color: #cfd8e3; }
    .quick-form-note { background: #eef6f4; border: 1px solid #cbe7db; border-radius: 8px; padding: 10px 12px; color: #24624a; font-size: .88rem; }
    .panel { background: #fff; border: 1px solid #d9e1e8; border-radius: 8px; box-shadow: 0 8px 22px rgba(23,33,47,.05); }
    .panel-header { padding: 14px 16px; border-bottom: 1px solid #d9e1e8; }
    .person-result-row { border: 1px solid #d9e1e8; border-radius: 8px; padding: 8px 10px; background: #fbfcfe; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <h2 class="h5 m-0 fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>Form ghi nhanh nhật ký</h2>
    </div>
    <form class="p-3">
      <div class="row g-2">
        <div class="col-6">
          <label class="form-label" for="ex-start">Từ giờ</label>
          <select class="form-select" id="ex-start">
            <option>07:30</option><option>08:00</option><option>08:30</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label" for="ex-end">Đến giờ</label>
          <select class="form-select" id="ex-end">
            <option>09:00</option><option>09:30</option><option>10:00</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Trạng thái</label>
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:6px;">
            <button class="btn btn-sm" style="border:2px solid #bfe4cf; background:#e8f6ef; color:#1f7a4d; font-weight:700; border-radius:999px;" type="button">
              <i class="bi bi-check2-circle me-1"></i>Hoàn thành
            </button>
            <button class="btn btn-sm" style="border:1px solid #bddcff; color:#155ea8; font-weight:600; border-radius:999px;" type="button">
              <i class="bi bi-arrow-repeat me-1"></i>Đang làm
            </button>
            <button class="btn btn-sm" style="border:1px solid #ffd0cc; color:#c2413b; font-weight:600; border-radius:999px;" type="button">
              <i class="bi bi-exclamation-triangle me-1"></i>Cần hỗ trợ
            </button>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label" for="ex-task">Việc/kế hoạch</label>
          <textarea class="form-control" id="ex-task" rows="3">07:30-09:30 | Tầng hầm B1 | Tủ MSB-B1: Kiểm tra nhiệt độ đầu cốt</textarea>
          <div class="quick-form-note mt-2">Lũy kế đã ghi: 42/140 m — nhập thêm số lượng hôm nay để cộng dồn</div>
        </div>
        <div class="col-12">
          <label class="form-label" for="ex-result">Kết quả</label>
          <div class="d-flex flex-wrap gap-2 mb-2">
            <button class="btn btn-sm" style="border:1px solid #cfd8e3; border-radius:999px; font-size:.85rem; font-weight:600; padding:6px 12px; background:#fff; color:#475467;" type="button">Không phát hiện bất thường</button>
            <button class="btn btn-sm" style="border:2px solid #2d8a5f; border-radius:999px; font-size:.85rem; font-weight:600; padding:5px 11px; background:#eef6f4; color:#24624a;" type="button">Đã xử lý dứt điểm</button>
          </div>
          <textarea class="form-control" id="ex-result" rows="3">Không phát hiện bất thường; Đã xử lý dứt điểm</textarea>
        </div>

        <!-- Kết quả từng người -->
        <div class="col-12">
          <label class="form-label"><i class="bi bi-people me-1"></i>Kết quả từng người tham gia</label>
          <div class="d-flex flex-column gap-2">
            <div class="person-result-row">
              <div class="d-flex align-items-center justify-content-between gap-2">
                <span class="fw-bold">Nguyễn Văn An</span>
                <select class="form-select form-select-sm w-auto">
                  <option>Hoàn thành tốt</option><option selected>Đạt</option><option>Chưa đạt</option>
                </select>
              </div>
              <div class="d-flex gap-2 mt-2">
                <input class="form-control form-control-sm" type="number" placeholder="SL" style="max-width:90px;">
                <input class="form-control form-control-sm flex-grow-1" placeholder="Ghi chú riêng (không bắt buộc)">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-grid gap-2 mt-3">
        <button class="btn btn-success btn-lg" type="submit"><i class="bi bi-check2-circle me-1"></i>Lưu</button>
        <button class="btn btn-outline-secondary" type="button"><i class="bi bi-eraser me-1"></i>Xóa nội dung</button>
      </div>
    </form>
  </div>
</body>
</html>
