<!-- @dsCard group="Layout" -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --brand: #176b87; --line: #d9e1e8; --surface: #fff; }
    body { background: #f6f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; color: #17212f; }
    .app-header { background: var(--surface); border-bottom: 1px solid var(--line); }
    .shell { max-width: 1240px; margin: 0 auto; padding: 18px; }
    .brand-mark { width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; background: var(--brand); color: #fff; }
    .user-name-label { display: inline-block; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
    .btn-icon { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
    .min-w-0 { min-width: 0; }
  </style>
</head>
<body>
  <!-- Trạng thái: đã đồng bộ -->
  <header class="app-header mb-4">
    <div class="shell py-3">
      <div class="d-flex align-items-center justify-content-between gap-2">
        <div class="d-flex align-items-center gap-2 min-w-0 flex-grow-1">
          <div class="brand-mark flex-shrink-0"><i class="bi bi-journal-check fs-4"></i></div>
          <div class="min-w-0">
            <div class="text-uppercase fw-bold text-primary text-truncate" style="font-size:.72rem;">BanDienScan</div>
            <h1 class="m-0 fw-bold text-truncate" style="font-size:1.2rem;">Nhật ký công việc</h1>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 flex-shrink-0">
          <span class="badge bg-success-subtle text-success shadow-sm px-2 py-2 rounded-pill" title="Đã đồng bộ toàn bộ">
            <i class="bi bi-cloud-check-fill"></i>
          </span>
          <button class="btn btn-outline-secondary btn-icon" type="button" title="Cỡ chữ">
            <span class="fw-bold">A</span>
          </button>
          <button class="btn btn-outline-secondary text-nowrap" type="button">
            <i class="bi bi-person-circle me-1"></i><span class="user-name-label">Nguyễn Văn An</span>
          </button>
          <a class="btn btn-outline-primary btn-icon" href="#" title="Về BanDienScan">
            <i class="bi bi-house"></i>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Trạng thái: đang chờ đồng bộ -->
  <header class="app-header">
    <div class="shell py-3">
      <div class="d-flex align-items-center justify-content-between gap-2">
        <div class="d-flex align-items-center gap-2 min-w-0 flex-grow-1">
          <div class="brand-mark flex-shrink-0"><i class="bi bi-journal-check fs-4"></i></div>
          <div class="min-w-0">
            <div class="text-uppercase fw-bold text-primary text-truncate" style="font-size:.72rem;">BanDienScan</div>
            <h1 class="m-0 fw-bold text-truncate" style="font-size:1.2rem;">Nhật ký công việc</h1>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 flex-shrink-0">
          <span class="badge bg-warning-subtle text-warning shadow-sm px-2 py-2 rounded-pill" title="Có 3 mục đang chờ đồng bộ">
            <i class="bi bi-cloud-arrow-up-fill"></i> 3
          </span>
          <button class="btn btn-outline-secondary btn-icon" type="button"><span class="fw-bold">A+</span></button>
          <button class="btn btn-outline-secondary text-nowrap" type="button">
            <i class="bi bi-person-circle me-1"></i><span class="user-name-label">Đăng nhập</span>
          </button>
          <a class="btn btn-outline-primary btn-icon" href="#"><i class="bi bi-house"></i></a>
        </div>
      </div>
    </div>
  </header>
</body>
</html>
