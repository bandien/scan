<!-- @dsCard group="Layout" -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --surface: #fff; --line: #d9e1e8; --muted: #667085; }
    body { background: #f6f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 20px; color: #17212f; }
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 8px 22px rgba(23,33,47,.05); }
    .panel-header { padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .section-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="section-label">Panel cơ bản</div>
  <div class="panel mb-4">
    <div class="panel-header">
      <h2 class="h5 m-0 fw-bold"><i class="bi bi-calendar3 text-primary me-2"></i>Tiêu đề section</h2>
    </div>
    <div class="p-3">
      <p class="text-secondary mb-0">Nội dung của panel. Dùng cho mọi khối thông tin: kế hoạch, nhật ký, form, bảng thống kê.</p>
    </div>
  </div>

  <div class="section-label">Panel có collapse toggle</div>
  <div class="panel mb-4">
    <div class="panel-header" style="cursor: pointer;">
      <div class="d-flex align-items-center justify-content-between">
        <h2 class="h5 m-0 fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>Ghi nhanh nhật ký</h2>
        <i class="bi bi-chevron-up"></i>
      </div>
    </div>
    <div class="p-3">
      <p class="text-secondary mb-0">Nội dung có thể collapse. Trên mobile form này sticky bottom.</p>
    </div>
  </div>

  <div class="section-label">Panel với toolbar</div>
  <div class="panel">
    <div class="panel-header">
      <h2 class="h5 mb-2 fw-bold"><i class="bi bi-calendar3 text-primary me-2"></i>Kế hoạch</h2>
      <div class="d-flex align-items-end gap-2 flex-wrap">
        <div>
          <label class="form-label" style="font-size:.78rem; font-weight:700; color:#475467;">Ngày</label>
          <input class="form-control" type="date" value="2026-07-11" style="border-radius:8px; border-color:#cfd8e3;">
        </div>
        <div>
          <label class="form-label" style="font-size:.78rem; font-weight:700; color:#475467;">Kiểu xem</label>
          <div class="btn-group" role="group">
            <button class="btn btn-outline-primary active" type="button">Ngày</button>
            <button class="btn btn-outline-primary" type="button">Tuần</button>
          </div>
        </div>
        <button class="btn btn-outline-secondary ms-auto" type="button"><i class="bi bi-funnel me-1"></i>Lọc</button>
        <button class="btn btn-primary" type="button"><i class="bi bi-arrow-clockwise me-1"></i>Nạp</button>
        <button class="btn btn-success" type="button"><i class="bi bi-plus-lg me-1"></i>Thêm kế hoạch</button>
      </div>
    </div>
    <div class="p-3">
      <p class="text-secondary mb-0">Nội dung bảng / danh sách kế hoạch.</p>
    </div>
  </div>
</body>
</html>
