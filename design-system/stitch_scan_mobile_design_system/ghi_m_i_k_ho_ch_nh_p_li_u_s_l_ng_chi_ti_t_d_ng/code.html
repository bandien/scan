<script>
        function selectPriority(element) {
            // Remove active classes from all chips
            document.querySelectorAll('.priority-chip').forEach(chip => {
                chip.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary-container');
                chip.classList.add('bg-surface-container-low', 'text-on-surface', 'border-outline-variant');
            });
            
            // Add active styles to clicked chip
            element.classList.remove('bg-surface-container-low', 'text-on-surface', 'border-outline-variant');
            element.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary-container');
        }

        // Initialize with Medium priority selected by default
        document.querySelector('[data-priority="medium"]').click();

        // Prevent layout shift on focus in mobile browsers
        window.addEventListener('resize', () => {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
                document.activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });
    </script>
