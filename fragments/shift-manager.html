<div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content rounded-4 border-0 shadow">
        <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold"><i class="bi bi-clock-history me-2 text-primary"></i>Quản lý Ca trực</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <!-- Form thêm/sửa ca trực -->
            <div id="shiftFormContainer" class="p-3 bg-light rounded-4 mb-4 border" style="display: none;">
                <h6 class="fw-bold mb-3 text-primary" id="shiftFormTitle"><i class="bi bi-plus-circle me-1"></i>Thêm ca trực mới</h6>
                <input type="hidden" id="manageShiftId">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Tên ca trực</label>
                    <input type="text" class="form-control rounded-3" id="manageShiftName" placeholder="Ví dụ: Ca Sáng, Ca Chiều, Ca Hành Chính">
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold small">Trạng thái</label>
                        <select class="form-select rounded-3" id="manageShiftStatus">
                            <option value="Active">Hoạt động (Active)</option>
                            <option value="Inactive">Tạm ngưng (Inactive)</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold small">Mô tả / Giờ làm việc</label>
                        <input type="text" class="form-control rounded-3" id="manageShiftDesc" placeholder="Ví dụ: 06:00 - 14:00">
                    </div>
                </div>
                <div class="d-flex gap-2 justify-content-end">
                    <button class="btn btn-light rounded-pill px-3" onclick="hideShiftForm()">Hủy</button>
                    <button class="btn btn-primary rounded-pill px-3 text-white fw-bold" onclick="submitManageShift()">Lưu ca trực</button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted small">Danh sách các ca trực hiện có trên hệ thống.</span>
                <button class="btn btn-sm btn-primary rounded-pill px-3" onclick="showAddShiftForm()">
                    <i class="bi bi-plus-lg"></i> Thêm ca trực
                </button>
            </div>

            <!-- Bảng danh sách ca trực -->
            <div class="rounded-4 overflow-hidden" style="background: var(--siu-surface-high); border: 1px solid var(--siu-outline-variant);">
                <div class="table-responsive" style="max-height: 300px;">
                    <table class="table table-hover align-middle mb-0" style="font-size: 0.85rem;">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">Mã</th>
                                <th>Tên ca trực</th>
                                <th>Mô tả / Giờ làm việc</th>
                                <th>Trạng thái</th>
                                <th class="text-end pe-3">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="shiftManagerTableBody">
                            <!-- Rendered dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="modal-footer border-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Đóng</button>
        </div>
    </div>
</div>
