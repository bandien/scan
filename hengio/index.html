<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cài đặt đồng hồ bơm | BanDienScan</title>
  <meta name="description" content="Lưu giờ cài đặt đồng hồ chạy bơm vào Google Sheet.">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#059669">
  <link rel="icon" href="../favicon.ico">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="../css/shared.css" rel="stylesheet">
  <style>
    :root {
      --bg: var(--bds-bg);
      --card: var(--bds-surface);
      --ink: var(--bds-on-surface);
      --muted: var(--bds-muted);
      --line: var(--bds-line);
      --brand: var(--bds-primary);
      --ok: var(--bds-success);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--bds-font);
    }

    .shell { max-width: 980px; margin: 0 auto; padding: 14px; }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(23, 33, 47, .05);
      overflow: hidden;
    }
    .panel-head { padding: 12px 14px; border-bottom: 1px solid var(--line); }
    .timer-card { padding: 14px; border-bottom: 1px solid var(--line); }
    .timer-card:last-child { border-bottom: 0; }
    .form-label { font-size: .78rem; font-weight: 700; color: #475467; }
    .form-control { border-radius: 8px; border-color: #cfd8e3; }
    .time-pair {
      background: #eef6f4;
      border: 1px solid #cbe7db;
      border-radius: 8px;
      padding: 10px;
    }
    .small-muted { color: var(--muted); font-size: .82rem; }
    .status-line { min-height: 22px; color: var(--muted); font-size: .86rem; }
    .summary-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .message-box {
      width: 100%;
      min-height: 108px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      padding: 10px 12px;
      background: #f8fafc;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .9rem;
      resize: vertical;
      white-space: pre-wrap;
    }
    .runtime-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      background: #e7f6ef;
      color: #08734b;
      font-weight: 800;
      font-size: .82rem;
    }

    @media (max-width: 640px) {
      .shell { padding: 10px; }
      h1 { font-size: 1.05rem; }
      .timer-card { padding: 12px; }
    }
  <script src="../js/app-header.js" data-root="../" data-title="Cài đặt Đồng Hồ Bơm" data-sub="BanDienScan" data-icon="bi-alarm" data-back="../index.html"></script>
</head>
<body>

  <main class="shell">
    <section class="summary-card">
      <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
        <div>
          <h2 class="h6 fw-bold m-0">Tin nhắn gửi nhân viên</h2>
          <div class="small-muted">Tự tính tổng thời gian chạy trong ngày, bấm copy để gửi Zalo/nhóm ca.</div>
        </div>
        <button class="btn btn-success btn-sm flex-shrink-0" type="button" id="btnCopyAll">
          <i class="bi bi-clipboard-check me-1"></i>Copy tất cả
        </button>
      </div>
      <textarea class="message-box" id="allMessage" readonly></textarea>
      <div class="small-muted mt-2" id="totalRuntime"></div>
    </section>

    <section class="panel mb-3">
      <div class="panel-head">
        <div class="d-flex justify-content-between align-items-center gap-2">
          <div>
            <h2 class="h5 fw-bold m-0">Giờ chạy đã lưu</h2>
            <div class="small-muted">Dữ liệu ghi vào Google Sheet tab <b>PumpTimerSettings</b>.</div>
          </div>
          <button class="btn btn-outline-secondary btn-sm" type="button" id="btnReload">
            <i class="bi bi-arrow-clockwise me-1"></i>Nạp lại
          </button>
        </div>
      </div>
      <div id="timerList"></div>
    </section>
  </main>

  <div class="position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index: 50">
    <div class="toast align-items-center border-0" id="toast" role="status" aria-live="polite" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastText">Đã lưu</div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Đóng"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/fontscale.js"></script>
  <script src="../js/pwa.js" data-root="../"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzW4TxDarLBOpZvO8hnE0R65IsCd95a5l-XPASjUmZNuefH5MiWMs8lCpLpggzFwyXK/exec";
    const API_TOKEN = "HAPU_QR_SECRET_2026";
    const STORAGE_KEY = "bandien_pump_timer_settings";
    const defaults = [
      {
        settingId: "PUMP-SUOI-CUN-160KW",
        pumpName: "Bơm 160kW Suối Cun",
        location: "Suối Cun",
        on1: "12:20",
        off1: "16:00",
        on2: "22:00",
        off2: "08:30",
        notes: "Thời gian chạy bơm 160kW Suối Cun"
      },
      {
        settingId: "PUMP-HO-NHA-BAO-DUONG-1",
        pumpName: "Bơm hồ Nhà Bảo Dưỡng 1",
        location: "Hồ Nhà Bảo Dưỡng 1",
        on1: "12:00",
        off1: "16:30",
        on2: "20:30",
        off2: "09:00",
        notes: "Thời gian chạy bơm hồ Nhà Bảo Dưỡng 1"
      }
    ];

    let settings = [];
    let toast;

    document.addEventListener("DOMContentLoaded", async () => {
      toast = new bootstrap.Toast(document.getElementById("toast"), { delay: 2200 });
      document.getElementById("btnReload").addEventListener("click", () => loadSettings(true));
      document.getElementById("btnCopyAll").addEventListener("click", () => copyText(document.getElementById("allMessage").value));
      settings = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || defaults;
      render();
      highlightAndScrollToPump();
      await loadSettings(false);
    });

    async function loadSettings(force) {
      if (!force && settings.length) {
        render();
        highlightAndScrollToPump();
      }
      const timerList = document.getElementById("timerList");
      if (force || !settings.length) bdsShowLoading(timerList, { type: 'skeleton', count: 2 });
      try {
        const data = await bdsApiFetch('getPumpTimerSettings', {}, { timeout: 15000, retries: 2 });
        if (data.status === "success" && Array.isArray(data.data) && data.data.length) {
          settings = data.data;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
          render();
          highlightAndScrollToPump();
        } else {
          bdsHideLoading(timerList);
        }
      } catch (error) {
        bdsHideLoading(timerList);
        if (!settings.length) {
          bdsShowError(timerList, 'Không thể tải dữ liệu từ server', () => loadSettings(true));
        } else {
          bdsShowToast("Đang dùng dữ liệu cục bộ", "warning");
        }
      }
    }

    function render() {
      renderSummary();
      document.getElementById("timerList").innerHTML = settings.map((item, index) => `
        <form class="timer-card" data-index="${index}" onsubmit="saveSetting(event, ${index})">
          <input type="hidden" name="settingId" value="${escapeAttr(item.settingId)}">
          <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
            <div>
              <div class="fw-bold">${escapeHtml(item.pumpName)}</div>
              <div class="small-muted">${escapeHtml(item.location || "")}</div>
            </div>
            <div class="text-end">
              <span class="runtime-pill" id="runtime-${index}"><i class="bi bi-stopwatch"></i>${escapeHtml(formatMinutes(dailyRuntimeMinutes(item)))}/ngày</span>
              <div class="mt-1"><span class="badge text-bg-light border">${escapeHtml(item.settingId)}</span></div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Tin nhắn copy gửi nhân viên</label>
            <textarea class="message-box" readonly id="message-${index}">${escapeHtml(scheduleMessage(item))}</textarea>
            <button class="btn btn-outline-success btn-sm mt-2" type="button" onclick="copyText(document.getElementById('message-${index}').value)">
              <i class="bi bi-clipboard me-1"></i>Copy tin nhắn
            </button>
          </div>

          <div class="row g-2">
            <div class="col-12">
              <label class="form-label">Tên bơm</label>
              <input class="form-control" name="pumpName" value="${escapeAttr(item.pumpName)}" required>
            </div>
            <div class="col-12">
              <label class="form-label">Vị trí</label>
              <input class="form-control" name="location" value="${escapeAttr(item.location || "")}">
            </div>
            <div class="col-12 col-md-6">
              <div class="time-pair">
                <div class="fw-bold small mb-2">Khung 1</div>
                <div class="row g-2">
                  <div class="col-6">
                    <label class="form-label">On1</label>
                    <input class="form-control" name="on1" type="time" step="60" value="${escapeAttr(item.on1 || "")}">
                  </div>
                  <div class="col-6">
                    <label class="form-label">Off1</label>
                    <input class="form-control" name="off1" type="time" step="60" value="${escapeAttr(item.off1 || "")}">
                  </div>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="time-pair">
                <div class="fw-bold small mb-2">Khung 2</div>
                <div class="row g-2">
                  <div class="col-6">
                    <label class="form-label">On2</label>
                    <input class="form-control" name="on2" type="time" step="60" value="${escapeAttr(item.on2 || "")}">
                  </div>
                  <div class="col-6">
                    <label class="form-label">Off2</label>
                    <input class="form-control" name="off2" type="time" step="60" value="${escapeAttr(item.off2 || "")}">
                  </div>
                </div>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Ghi chú</label>
              <input class="form-control" name="notes" value="${escapeAttr(item.notes || "")}">
            </div>
          </div>

          <div class="d-grid mt-3">
            <button class="btn btn-success" type="submit"><i class="bi bi-cloud-check me-1"></i>Lưu vào Google Sheet</button>
          </div>
          <div class="status-line mt-2" id="status-${index}">${item.updatedAt ? "Cập nhật: " + escapeHtml(String(item.updatedAt)) : ""}</div>
        </form>
      `).join("");
    }

    async function saveSetting(event, index) {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = Object.fromEntries(new FormData(form).entries());
      payload.updatedBy = localStorage.getItem("bandien_nhatky_employee") || "Web";
      document.getElementById(`status-${index}`).textContent = "Đang lưu...";

      settings[index] = { ...settings[index], ...payload };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      renderSummary();
      const messageEl = document.getElementById(`message-${index}`);
      if (messageEl) messageEl.value = scheduleMessage(settings[index]);
      const runtimeEl = document.getElementById(`runtime-${index}`);
      if (runtimeEl) runtimeEl.innerHTML = `<i class="bi bi-stopwatch"></i>${escapeHtml(formatMinutes(dailyRuntimeMinutes(settings[index])))}/ngày`;

      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "savePumpTimerSetting",
            token: API_TOKEN,
            payload
          })
        });
        const data = await res.json();
        if (data.status !== "success") throw new Error(data.message || "Save failed");
        document.getElementById(`status-${index}`).textContent = "Đã lưu Google Sheet";
        showToast("Đã lưu");
      } catch (error) {
        document.getElementById(`status-${index}`).textContent = "Lưu cục bộ, chưa đồng bộ";
        showToast("Chưa đồng bộ được");
      }
    }

    function renderSummary() {
      const message = [
        `LỊCH CHẠY BƠM TRONG NGÀY`,
        ``,
        ...settings.map((item, index) => `${index + 1}. ${scheduleMessage(item)}`)
      ].join("\n");
      const allMessage = document.getElementById("allMessage");
      const totalRuntime = document.getElementById("totalRuntime");
      if (allMessage) allMessage.value = message;
      if (totalRuntime) totalRuntime.textContent = "Không cộng gộp nhiều bơm; xem tổng chạy/ngày riêng trong từng bơm.";
    }

    function scheduleMessage(item) {
      const slots = [
        timeSlotText("Khung 1", item.on1, item.off1),
        timeSlotText("Khung 2", item.on2, item.off2)
      ].filter(Boolean);
      return [
        `${item.pumpName || "Bơm"}${item.location ? " - " + item.location : ""}`,
        slots.length ? slots.join("\n") : "Chưa cài khung giờ chạy",
        `Tổng chạy/ngày: ${formatMinutes(dailyRuntimeMinutes(item))}`,
        item.notes ? `Ghi chú: ${item.notes}` : ""
      ].filter(Boolean).join("\n");
    }

    function timeSlotText(label, on, off) {
      if (!on && !off) return "";
      if (!on || !off) return `${label}: ${on || "--:--"} - ${off || "--:--"} (chưa đủ giờ)`;
      return `${label}: ${on} - ${off} (${formatMinutes(durationMinutes(on, off))})`;
    }

    function durationMinutes(start, end) {
      const startMin = parseTimeMinutes(start);
      const endMin = parseTimeMinutes(end);
      if (startMin === null || endMin === null) return 0;
      let diff = endMin - startMin;
      if (diff < 0) diff += 24 * 60;
      return diff;
    }

    function dailyRuntimeMinutes(item) {
      return durationMinutes(item.on1, item.off1) + durationMinutes(item.on2, item.off2);
    }

    function parseTimeMinutes(value) {
      const match = /^(\d{1,2}):(\d{2})$/.exec(String(value || "").trim());
      if (!match) return null;
      const hour = Number(match[1]);
      const minute = Number(match[2]);
      if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
      return hour * 60 + minute;
    }

    function formatMinutes(totalMinutes) {
      const minutes = Math.max(0, Math.round(Number(totalMinutes) || 0));
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      if (h && m) return `${h} giờ ${m} phút`;
      if (h) return `${h} giờ`;
      return `${m} phút`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Đã copy tin nhắn");
      } catch (error) {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
        showToast("Đã copy tin nhắn");
      }
    }

    function highlightAndScrollToPump() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('settingId') || urlParams.get('id');
      if (!targetId) return;

      const forms = document.querySelectorAll('form.timer-card');
      forms.forEach(form => {
        const input = form.querySelector('input[name="settingId"]');
        if (input && input.value === targetId) {
          form.style.border = '3px solid var(--ok)';
          form.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.3)';
          form.style.borderRadius = '8px';
          form.style.transition = 'all 0.5s ease';
          
          setTimeout(() => {
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 300);
        }
      });
    }

    function showToast(message) {
      document.getElementById("toastText").textContent = message;
      toast.show();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }
  </script>
<script src="../js/bottomnav.js" data-root="../"></script>
</body>
</html>
