<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Bảo trì QR-UID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-container { max-width: 500px; margin: auto; padding: 20px; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px; background: white; transition: transform 0.3s; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 20px; border: 2px solid var(--accent-color); }
        .check-item { padding: 15px; border-bottom: 1px solid #f1f1f1; display: flex; justify-content: space-between; align-items: center; }
        .check-item:last-child { border-bottom: none; }
        .btn-scan { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; height: 65px; font-weight: 700; border-radius: 12px; border: none; letter-spacing: 1px; }
        .btn-scan:hover { opacity: 0.9; transform: translateY(-2px); }
        .status-badge { font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; }
        .bg-pending { background-color: #ffeaa7; color: #d35400; }
    </style>
</head>
<body>

<div class="main-container">
    <header class="text-center my-4">
        <h3 class="fw-bold text-dark">QR-UID MAINTENANCE</h3>
        <p class="text-muted">Hệ thống Quản lý Thiết bị Thông minh</p>
    </header>

    <div id="reader"></div>
    <button class="btn btn-scan w-100 mb-4 shadow" id="startScan">
        <i class="bi bi-qr-code-scan"></i> 📸 QUÉT MÃ THIẾT BỊ
    </button>

    <div id="infoSection" style="display: none;">
        <div class="card card-custom">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="text-primary fw-bold mb-0" id="disp_name">Đang tải...</h5>
                    <span class="status-badge bg-pending">Chờ kiểm tra</span>
                </div>
                <p class="mb-1 text-secondary small"><strong>UID:</strong> <span id="disp_uid" class="text-dark">---</span></p>
                <p class="mb-0 text-secondary small"><strong>Vị trí:</strong> <span id="disp_loc" class="text-dark">---</span></p>
            </div>
        </div>

        <div class="card card-custom">
            <div class="card-header bg-white fw-bold py-3">DANH MỤC KIỂM TRA</div>
            <div id="checklistItems">
                <div class="check-item">
                    <span>1. Kiểm tra nguồn điện/Pin</span>
                    <input class="form-check-input" type="checkbox" id="item1">
                </div>
                <div class="check-item">
                    <span>2. Độ rung & Nhiệt độ máy</span>
                    <input class="form-check-input" type="checkbox" id="item2">
                </div>
                <div class="check-item">
                    <span>3. Vệ sinh & Tra dầu mỡ</span>
                    <input class="form-check-input" type="checkbox" id="item3">
                </div>
            </div>
            <div class="p-3 border-top">
                <label class="small fw-bold text-secondary">Thông số đo đạc / Ghi chú:</label>
                <textarea class="form-control mt-2 border-0 bg-light" id="notes" rows="3" placeholder="Nhập kết quả thực tế..."></textarea>
            </div>
        </div>

        <button class="btn btn-success w-100 py-3 fw-bold shadow-lg rounded-pill" onclick="submitData()">
            XÁC NHẬN & LƯU BÁO CÁO
        </button>
    </div>
</div>

<script>
    const scanner = new Html5Qrcode("reader");
    const startBtn = document.getElementById('startScan');
    let gasUrl = 'YOUR_GAS_DEPLOYMENT_URL'; // Sẽ cập nhật sau

    startBtn.addEventListener('click', () => {
        document.getElementById('reader').style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: {width: 250, height: 250} }, 
        (uid) => {
            document.getElementById('disp_uid').innerText = uid;
            document.getElementById('infoSection').style.display = 'block';
            document.getElementById('reader').style.display = 'none';
            startBtn.innerHTML = "🔄 QUÉT THIẾT BỊ KHÁC";
            scanner.stop();
            fetchDataFromGAS(uid);
        }, 
        (err) => { /* ignore scan errors */ });
    });

    async function fetchDataFromGAS(uid) {
        // Placeholder - Codex sẽ viết logic hoàn chỉnh
        console.log("Fetching info for UID:", uid);
        setTimeout(() => {
            document.getElementById('disp_name').innerText = "Thiết bị: " + uid;
            document.getElementById('disp_loc').innerText = "Khu vực kỹ thuật";
        }, 1000);
    }

    async function submitData() {
        const uid = document.getElementById('disp_uid').innerText;
        const notes = document.getElementById('notes').value;
        const items = {
            item1: document.getElementById('item1').checked,
            item2: document.getElementById('item2').checked,
            item3: document.getElementById('item3').checked
        };
        
        alert("Đang gửi báo cáo bảo trì cho UID: " + uid);
        // logic fetch POST to GAS will be added here
        location.reload();
    }
</script>
</body>
</html>
