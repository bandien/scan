<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chốt Chỉ Số Đồng Hồ | BanDienScan</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="css/shared.css" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sso.js"></script>
    <script src="js/fontscale.js"></script>
    <script src="js/pwa.js" data-root="./"></script>
    <style>
        body { background: var(--siu-bg); color: var(--siu-on-surface); font-family: var(--bds-font); min-height: 100vh; padding-bottom: 40px; }
        .app-shell { max-width: 460px; margin: 0 auto; padding: 16px; }

        .card-premium { background: var(--siu-surface); border-radius: var(--r-lg); border: 1px solid var(--siu-outline-variant); overflow: hidden; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 16px; }

        .stat-card { background: var(--siu-surface-high); border-radius: 16px; border: 1px solid var(--siu-outline-variant); padding: 12px; text-align: center; }
        .info-label { font-size: 0.78rem; font-weight: 700; color: var(--siu-on-surface-variant); margin-bottom: 4px; }

        .form-control-siu { background: var(--siu-surface-high); border: 1px solid var(--siu-outline-variant); color: var(--siu-on-surface); border-radius: 12px; padding: 12px 14px; font-size: 0.95rem; font-weight: 600; }
        .form-control-siu:focus { background: var(--siu-surface); border-color: var(--siu-primary); box-shadow: none; }

        .meter-type-badge { padding: 6px 14px; border-radius: 50px; font-weight: 800; font-size: 0.78rem; display: inline-flex; align-items: center; gap: 6px; }
        .badge-dien  { background: #fff3cd; color: #664d03; }
        .badge-nuoc  { background: #cff4fc; color: #055160; }

        .btn-submit-main {
            background: var(--siu-success, #059669); color: white; font-weight: 900; padding: 18px;
            border-radius: 20px; border: none; width: 100%; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(5,150,105,0.25);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit-main:active { transform: scale(0.97); }
        .btn-submit-main:disabled { background: #9ca3af; box-shadow: none; }

        .quick-link-btn {
            display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 14px;
            background: var(--siu-surface-high); border: 1px solid var(--siu-outline-variant);
            color: var(--siu-on-surface); text-decoration: none; font-weight: 700; font-size: 0.9rem;
        }
        .quick-link-btn:active { transform: scale(0.98); }

        .log-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--siu-outline-variant); }
        .log-row:last-child { border-bottom: none; }
        .log-alert { color: #dc2626; font-weight: 800; }

        /* Phóng to chữ cho nhân viên lớn tuổi — dùng chung key với pump_info/nhatky */
        #toastBox { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 8px; width: calc(100% - 32px); max-width: 420px; }
        .custom-toast { color: white; padding: 12px 18px; border-radius: 12px; font-weight: 700; font-size: 0.88rem; box-shadow: 0 8px 20px rgba(0,0,0,.2); display: flex; align-items: center; gap: 8px; transition: opacity .4s; }
    <script src="js/app-header.js" data-title="Chốt Chỉ Số Đồng Hồ" data-sub="BanDienScan" data-icon="bi-speedometer2" data-back="index.html"></script>
</head>
<body>

<div class="app-shell" style="padding-top: 16px;">

    <!-- Tìm đồng hồ -->
    <div class="card-premium" id="pickerCard">
        <div class="fw-bold mb-2" style="font-size: .8rem; color: var(--siu-on-surface-variant);"><i class="bi bi-search me-1"></i>Chọn đồng hồ cần chốt chỉ số</div>
        <select id="meterSelect" class="form-select form-control-siu mb-2"></select>
        <div class="d-flex gap-2">
            <input type="text" id="manualUidInput" class="form-control form-control-siu" placeholder="Hoặc nhập mã đồng hồ (UID)...">
            <button class="btn btn-primary px-3 fw-bold" style="border-radius: 12px; min-width: 56px;" onclick="handleManualEntry()">GO</button>
        </div>
    </div>

    <!-- Đang xem bar -->
    <div class="d-flex align-items-center justify-content-between mb-2" id="viewingBar" style="display:none;">
        <span class="small fw-bold text-muted"><i class="bi bi-eye-fill me-1"></i>Đang xem: <span id="viewingMeterName">--</span></span>
        <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="resetToPicker()"><i class="bi bi-arrow-repeat me-1"></i>Đổi đồng hồ khác</button>
    </div>

    <!-- Skeleton -->
    <div id="skeletonLoader" style="display:none;" class="card-premium">
        <div class="placeholder-glow">
            <div class="placeholder col-8 rounded mb-2" style="height: 24px;"></div>
            <div class="placeholder col-5 rounded mb-3" style="height: 16px;"></div>
            <div class="placeholder col-12 rounded" style="height: 60px;"></div>
        </div>
    </div>

    <!-- Meter Result -->
    <div id="meterResult" style="display:none;">
        <!-- Info Card -->
        <div class="card-premium">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <span class="badge bg-dark px-2 py-1 rounded-2 font-monospace fw-bold mb-2" style="font-size: .72rem;" id="meterUidBadge">UID: #--</span>
                    <h2 class="fw-bold mb-1" style="font-size: 1.25rem; color: var(--siu-on-surface);" id="meterName">--</h2>
                    <div class="fw-bold" style="font-size: .88rem; color: var(--siu-on-surface-variant);" id="meterLocation"><i class="bi bi-geo-alt-fill text-danger me-1"></i> --</div>
                </div>
                <span id="meterTypeBadge"></span>
            </div>

            <div class="row g-2 pt-3 mt-2 border-top" style="border-color: var(--siu-outline-variant) !important;">
                <div class="col-6">
                    <div class="stat-card">
                        <div class="info-label"><i class="bi bi-hash text-warning me-1"></i>Mã sản xuất</div>
                        <div class="fw-bold" style="font-size: .88rem;" id="meterSerial">--</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="stat-card">
                        <div class="info-label"><i class="bi bi-clock-history text-info me-1"></i>Chỉ số lần trước</div>
                        <div class="fw-bold" style="font-size: .88rem;" id="meterLastReading">Chưa có</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form nhập chỉ số -->
        <div class="card-premium">
            <div class="fw-bold mb-3" style="font-size: .95rem;"><i class="bi bi-pencil-square text-primary me-2"></i>Nhập chỉ số &amp; thao tác</div>

            <form id="meterForm" onsubmit="handleSubmit(event)">
                <div class="mb-2">
                    <label class="info-label">Chỉ số đọc được hiện tại (<span id="inputUnitLabel">kWh</span>) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" inputmode="decimal" id="meterValueInput" class="form-control form-control-siu" placeholder="Nhập chỉ số hiển thị trên đồng hồ...">
                </div>
                <div class="mb-2">
                    <label class="info-label">Họ và tên người chốt chỉ số <span class="text-danger">*</span></label>
                    <input type="text" id="operatorInput" class="form-control form-control-siu" placeholder="Nhập tên nhân viên...">
                </div>
                <div class="mb-2">
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="info-label mb-0">Thời gian thực hiện <span class="text-primary fw-normal" style="font-size:.72rem;">(đổi nếu ghi bù)</span></label>
                        <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill py-0 px-2" style="font-size:.72rem;" onclick="resetToCurrentTime()">Bây giờ</button>
                    </div>
                    <input type="datetime-local" id="eventTimeInput" class="form-control form-control-siu">
                </div>
                <div class="mb-3">
                    <label class="info-label">Ghi chú kiểm tra (không bắt buộc)</label>
                    <input type="text" id="notesInput" class="form-control form-control-siu" placeholder="Ghi chú hỏng hóc, chỉ số bất thường...">
                </div>

                <button type="submit" class="btn-submit-main" id="btnSubmit">
                    <i class="bi bi-check-circle-fill"></i> XÁC NHẬN CHỐT CHỈ SỐ
                </button>
            </form>

            <div class="mt-3">
                <a class="quick-link-btn" href="print-meter-qr.html"><i class="bi bi-qr-code text-primary"></i> In mã QR đồng hồ</a>
            </div>
        </div>

        <!-- Nhật ký -->
        <div class="card-premium">
            <div class="fw-bold mb-2" style="font-size: .95rem;"><i class="bi bi-journal-text text-primary me-2"></i>Lịch sử chốt chỉ số gần đây</div>
            <div id="historyList">
                <div class="text-center text-muted small py-3"><span class="spinner-border spinner-border-sm me-2"></span>Đang tải lịch sử...</div>
            </div>
        </div>
    </div>
</div>

<div id="toastBox"></div>

<script>
    // ── Danh mục đồng hồ — nạp từ getGolfTemplates... à không, getMeterPoints ──
    // Cache trong localStorage để dùng offline; đồng bộ lại mỗi lần có mạng.
    const METER_DICT_KEY = 'bds_meter_points_dict';
    const METER_QUEUE_KEY = 'cmms_meter_queue';
    let METER_DICT = {};
    try { METER_DICT = JSON.parse(localStorage.getItem(METER_DICT_KEY)) || {}; } catch (e) { METER_DICT = {}; }

    let currentMeter = null;
    let isSyncing = false;

    function showToast(msg, type = 'success') {
        const box = document.getElementById('toastBox');
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.style.background = type === 'success' ? '#10b981' : (type === 'warning' ? '#f59e0b' : '#ef4444');
        toast.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-triangle'}"></i> ${msg}`;
        box.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3000);
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[ch]));
    }

    // Nguồn tên người thực hiện dùng chung toàn hệ thống (js/sso.js).
    function getLoggedInUser() {
        return window.BD_SSO ? BD_SSO.getOperatorName() : '';
    }

    function resetToCurrentTime() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('eventTimeInput').value = now.toISOString().slice(0, 16);
    }

    // Notes lưu dạng "Mã sản xuất: X | Kiểu đo: Y | QR: ..." — tách ra để hiển thị gọn
    function parseMeterNotes(notes) {
        const str = String(notes || '');
        const serialMatch = str.match(/Mã sản xuất:\s*([^|]+)/i);
        const kindMatch = str.match(/Kiểu đo:\s*([^|]+)/i);
        return {
            serial: serialMatch ? serialMatch[1].trim() : 'Chưa có',
            kind: kindMatch ? kindMatch[1].trim() : ''
        };
    }

    async function loadServerMeterPoints() {
        try {
            const res = await bdsApiFetch('getMeterPoints');
            if (res.status === 'success' && Array.isArray(res.points) && res.points.length > 0) {
                const newDict = {};
                res.points.forEach(p => { newDict[p.meterId] = p; });
                METER_DICT = newDict;
                localStorage.setItem(METER_DICT_KEY, JSON.stringify(METER_DICT));
            }
        } catch (err) {
            console.warn('Không nạp được danh mục đồng hồ mới, dùng cache:', err);
        }
        populateMeterSelect();
    }

    function populateMeterSelect() {
        const select = document.getElementById('meterSelect');
        const entries = Object.values(METER_DICT).sort((a, b) => (a.location || '').localeCompare(b.location || '') || a.name.localeCompare(b.name));
        const groups = { 'Điện': [], 'Nước': [] };
        entries.forEach(p => { (groups[p.type] || (groups[p.type] = [])).push(p); });

        let html = '<option value="">— Chọn đồng hồ —</option>';
        Object.keys(groups).forEach(type => {
            if (!groups[type].length) return;
            html += `<optgroup label="${escapeHtml(type)}">`;
            groups[type].forEach(p => {
                html += `<option value="${escapeHtml(p.meterId)}">${escapeHtml(p.name)} — ${escapeHtml(p.location)}</option>`;
            });
            html += '</optgroup>';
        });
        select.innerHTML = html;
        if (currentMeter) select.value = currentMeter.meterId;
    }

    document.getElementById('meterSelect').addEventListener('change', function () {
        if (this.value) loadMeter(this.value);
    });

    function handleManualEntry() {
        const val = document.getElementById('manualUidInput').value.trim();
        if (!val) { showToast('Vui lòng chọn hoặc nhập mã đồng hồ', 'warning'); return; }
        loadMeter(val);
    }

    function resetToPicker() {
        document.getElementById('meterResult').style.display = 'none';
        document.getElementById('viewingBar').style.display = 'none';
        document.getElementById('pickerCard').style.display = 'block';
        history.replaceState(null, '', 'meter.html');
    }

    async function loadMeter(idRaw) {
        if (!idRaw) { showToast('Không nhận diện được mã đồng hồ', 'danger'); return; }
        const id = String(idRaw).trim();

        document.getElementById('pickerCard').style.display = 'none';
        document.getElementById('meterResult').style.display = 'none';
        document.getElementById('skeletonLoader').style.display = 'block';

        currentMeter = METER_DICT[id] || {
            meterId: id, type: 'Điện', name: `Đồng hồ #${id}`, location: 'Chưa rõ khu vực',
            unit: 'kWh', notes: '', lastReading: null, lastDate: null
        };
        if (!METER_DICT[id]) showToast(`Đồng hồ mã ${id} chưa có trong danh mục, hiển thị thông tin tối giản`, 'warning');

        history.replaceState(null, '', `meter.html?uid=${encodeURIComponent(currentMeter.meterId)}`);

        document.getElementById('viewingMeterName').innerText = currentMeter.name;
        document.getElementById('viewingBar').style.display = 'flex';

        renderMeterUI();
        resetToCurrentTime();
        loadHistory();

        document.getElementById('skeletonLoader').style.display = 'none';
        document.getElementById('meterResult').style.display = 'block';
    }

    function renderMeterUI() {
        const meta = parseMeterNotes(currentMeter.notes);
        document.getElementById('meterUidBadge').innerText = `UID: #${currentMeter.meterId}`;
        document.getElementById('meterName').innerText = currentMeter.name;
        document.getElementById('meterLocation').innerHTML = `<i class="bi bi-geo-alt-fill text-danger me-1"></i> ${escapeHtml(currentMeter.location || 'Chưa rõ')}`;
        document.getElementById('meterSerial').innerText = meta.serial;
        document.getElementById('inputUnitLabel').innerText = currentMeter.unit || 'kWh';

        const isWater = currentMeter.type === 'Nước';
        document.getElementById('headerIcon').innerHTML = `<i class="bi ${isWater ? 'bi-droplet-fill' : 'bi-lightning-charge-fill'}"></i>`;
        document.getElementById('meterTypeBadge').innerHTML = `<span class="meter-type-badge ${isWater ? 'badge-nuoc' : 'badge-dien'}"><i class="bi ${isWater ? 'bi-droplet-fill' : 'bi-lightning-charge-fill'}"></i>${escapeHtml(currentMeter.type || 'Điện')}</span>`;

        // Chỉ số lần trước ưu tiên lấy từ local state offline nếu vừa gửi mà chưa đồng bộ xong
        const localLast = localStorage.getItem(`meter_last_${currentMeter.meterId}`);
        if (localLast) {
            const p = JSON.parse(localLast);
            document.getElementById('meterLastReading').innerText = `${p.value} ${currentMeter.unit || ''} · ${new Date(p.timestamp).toLocaleDateString('vi-VN')}`;
        } else if (currentMeter.lastReading != null && currentMeter.lastReading !== '') {
            const dateStr = currentMeter.lastDate ? new Date(currentMeter.lastDate).toLocaleDateString('vi-VN') : '';
            document.getElementById('meterLastReading').innerText = `${currentMeter.lastReading} ${currentMeter.unit || ''}${dateStr ? ' · ' + dateStr : ''}`;
        } else {
            document.getElementById('meterLastReading').innerText = 'Chưa có';
        }
    }

    async function handleSubmit(e) {
        e.preventDefault();
        if (!currentMeter) return;

        const val = document.getElementById('meterValueInput').value.trim();
        const operator = document.getElementById('operatorInput').value.trim();
        const notes = document.getElementById('notesInput').value.trim();
        const customTimeVal = document.getElementById('eventTimeInput').value;

        if (!val || isNaN(val)) { showToast('Vui lòng nhập chỉ số đọc được hợp lệ', 'warning'); document.getElementById('meterValueInput').focus(); return; }
        if (!operator) { showToast('Vui lòng nhập tên người thực hiện', 'warning'); document.getElementById('operatorInput').focus(); return; }

        BD_SSO.setOperatorName(operator);
        const selectedDate = customTimeVal ? new Date(customTimeVal) : new Date();
        const timestampIso = selectedDate.toISOString();

        const btnSubmit = document.getElementById('btnSubmit');
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Đang lưu...`;

        // Lưu cục bộ ngay để "Chỉ số lần trước" cập nhật tức thì dù chưa đồng bộ xong
        localStorage.setItem(`meter_last_${currentMeter.meterId}`, JSON.stringify({ value: Number(val), timestamp: timestampIso }));

        const queue = JSON.parse(localStorage.getItem(METER_QUEUE_KEY) || '[]');
        queue.push({
            action: 'submitMeterReading',
            payload: {
                meterId: currentMeter.meterId,
                value: Number(val),
                user: operator,
                notes,
                timestamp: timestampIso
            }
        });
        localStorage.setItem(METER_QUEUE_KEY, JSON.stringify(queue));

        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        showToast(`Đã ghi nhận chỉ số ${val} ${currentMeter.unit || ''} cho ${currentMeter.name}, đang đồng bộ...`);
        document.getElementById('meterValueInput').value = '';
        document.getElementById('notesInput').value = '';
        resetToCurrentTime();
        renderMeterUI();

        btnSubmit.disabled = false;
        btnSubmit.innerHTML = `<i class="bi bi-check-circle-fill"></i> XÁC NHẬN CHỐT CHỈ SỐ`;

        syncOfflineQueue();
        loadHistory();
    }

    async function syncOfflineQueue() {
        if (isSyncing) return;
        if (typeof navigator !== 'undefined' && !navigator.onLine) { updateSyncBadge(); return; }

        let queue = JSON.parse(localStorage.getItem(METER_QUEUE_KEY) || '[]');
        if (queue.length === 0) { updateSyncBadge(); return; }

        isSyncing = true;
        updateSyncBadge();

        let failed = false;
        const remainingQueue = [];
        for (const item of queue) {
            if (failed) { remainingQueue.push(item); continue; }
            try {
                const res = await bdsApiPost(item.action, item.payload);
                if (res.status !== 'success') throw new Error(res.message);
                if (res.alert) showToast(`⚡ Cảnh báo: sản lượng vượt ngưỡng (đồng hồ ${item.payload.meterId})`, 'warning');
            } catch (err) {
                console.error(`Lỗi đồng bộ tác vụ ${item.action}:`, err);
                failed = true;
                remainingQueue.push(item);
            }
        }

        localStorage.setItem(METER_QUEUE_KEY, JSON.stringify(remainingQueue));
        isSyncing = false;
        updateSyncBadge();

        if (!failed) loadHistory();
    }

    function updateSyncBadge() {
        const badge = document.getElementById('syncStatusBadge');
        if (!badge) return;
        const queue = JSON.parse(localStorage.getItem(METER_QUEUE_KEY) || '[]');

        if (queue.length === 0) {
            badge.className = 'badge rounded-pill bg-success-subtle text-success border border-success-subtle px-2 py-1 me-1';
            badge.innerHTML = `<i class="bi bi-cloud-check-fill"></i> Đã đồng bộ`;
            badge.style.display = 'inline-flex';
            setTimeout(() => {
                const qNow = JSON.parse(localStorage.getItem(METER_QUEUE_KEY) || '[]');
                if (qNow.length === 0) badge.style.display = 'none';
            }, 3000);
        } else if (isSyncing) {
            badge.className = 'badge rounded-pill bg-warning-subtle text-warning border border-warning-subtle px-2 py-1 me-1';
            badge.innerHTML = `<span class="spinner-border spinner-border-sm me-1" style="width:.8rem;height:.8rem;"></span> Đang gửi (${queue.length})`;
            badge.style.display = 'inline-flex';
        } else {
            badge.className = 'badge rounded-pill bg-danger-subtle text-danger border border-danger-subtle px-2 py-1 me-1';
            badge.innerHTML = `<i class="bi bi-cloud-arrow-up-fill"></i> Chờ gửi (${queue.length})`;
            badge.style.display = 'inline-flex';
        }
    }

    async function loadHistory() {
        const el = document.getElementById('historyList');
        el.innerHTML = '<div class="text-center text-muted small py-3"><span class="spinner-border spinner-border-sm me-2"></span>Đang tải lịch sử...</div>';
        try {
            const res = await bdsApiFetch('getMeterHistory', { meterId: currentMeter.meterId, limit: 10 });
            if (res.status === 'success' && Array.isArray(res.history)) {
                if (res.history.length === 0) {
                    el.innerHTML = '<div class="text-center text-muted small py-3">Chưa có lịch sử chốt chỉ số nào.</div>';
                    return;
                }
                el.innerHTML = res.history.map(row => {
                    const d = new Date(row.timestamp);
                    const dateStr = d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
                    const timeStr = d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                    return `
                        <div class="log-row">
                            <div>
                                <div class="fw-bold" style="font-size:.85rem;">${timeStr} · ${dateStr}</div>
                                <div class="text-muted" style="font-size:.78rem;">${escapeHtml(row.user || '--')}</div>
                            </div>
                            <div class="text-end">
                                <div class="fw-bold ${row.alert ? 'log-alert' : ''}">${row.value} ${escapeHtml(currentMeter.unit || '')}</div>
                                <div class="text-muted" style="font-size:.72rem;">Sản lượng: ${row.calculated}</div>
                            </div>
                        </div>`;
                }).join('');
            } else {
                el.innerHTML = `<div class="text-center text-danger small py-3">Lỗi tải lịch sử: ${escapeHtml(res.message || 'Không xác định')}</div>`;
            }
        } catch (err) {
            el.innerHTML = '<div class="text-center text-danger small py-3">Lỗi kết nối, không tải được lịch sử.</div>';
        }
    }

    window.addEventListener('load', async () => {
        // Hiện danh mục cache ngay (offline-first), rồi làm mới ngầm từ server
        populateMeterSelect();
        loadServerMeterPoints();

        const urlParams = new URLSearchParams(window.location.search);
        const startId = urlParams.get('uid') || urlParams.get('id') || urlParams.get('meterId');

        document.getElementById('operatorInput').value = getLoggedInUser();
        resetToCurrentTime();
        if (startId) loadMeter(startId);

        updateSyncBadge();
        syncOfflineQueue();
        window.addEventListener('online', syncOfflineQueue);
        setInterval(syncOfflineQueue, 15000);
    });
</script>
<script src="js/bottomnav.js" data-root="./"></script>
</body>
</html>
