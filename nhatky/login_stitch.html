<!DOCTYPE html>
<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fidelity Secure - Đăng nhập</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Public+Sans:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Public+Sans:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#ffb599",
                    "inverse-primary": "#0057ce",
                    "inverse-on-surface": "#2d3039",
                    "outline-variant": "#424655",
                    "on-error": "#690005",
                    "surface-container-low": "#181c24",
                    "on-secondary": "#0d2d69",
                    "surface-variant": "#31353d",
                    "on-secondary-fixed": "#001847",
                    "on-primary": "#002c70",
                    "primary-fixed-dim": "#b1c5ff",
                    "on-tertiary-fixed-variant": "#7f2b00",
                    "on-primary-fixed-variant": "#00419e",
                    "on-primary-container": "#ffffff",
                    "surface-container-lowest": "#0b0e16",
                    "secondary": "#b1c5ff",
                    "surface": "#10131b",
                    "on-tertiary-fixed": "#370e00",
                    "secondary-fixed-dim": "#b1c5ff",
                    "surface-tint": "#b1c5ff",
                    "tertiary-container": "#cf4b00",
                    "surface-container": "#1c2028",
                    "inverse-surface": "#e0e2ed",
                    "surface-dim": "#10131b",
                    "on-secondary-fixed-variant": "#2a4481",
                    "primary": "#b1c5ff",
                    "outline": "#8c90a1",
                    "on-tertiary-container": "#ffffff",
                    "on-primary-fixed": "#001946",
                    "surface-container-high": "#262a32",
                    "on-surface-variant": "#c2c6d8",
                    "tertiary-fixed-dim": "#ffb599",
                    "surface-bright": "#363942",
                    "on-surface": "#e0e2ed",
                    "primary-container": "#0e6efd",
                    "background": "#10131b",
                    "secondary-fixed": "#dae2ff",
                    "error-container": "#93000a",
                    "surface-container-highest": "#31353d",
                    "secondary-container": "#2a4481",
                    "primary-fixed": "#dae2ff",
                    "on-tertiary": "#5a1c00",
                    "on-secondary-container": "#9bb4f8",
                    "tertiary-fixed": "#ffdbce",
                    "on-background": "#e0e2ed",
                    "error": "#ffb4ab",
                    "on-error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "base": "8px",
                    "gutter": "16px",
                    "sm": "8px",
                    "lg": "24px",
                    "xl": "32px",
                    "margin": "24px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "label-md": ["Public Sans"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        body {
            background-color: #10131b;
            color: #e0e2ed;
            -webkit-font-smoothing: antialiased;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(28, 32, 40, 0.8);
        }
    </style>
</head>
<body class="font-body-md text-body-md overflow-hidden">
<!-- Background Atmospheric Shader -->
<div class="fixed inset-0 z-0">

</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex min-h-screen flex-col items-center justify-center px-margin">
<!-- Header / Brand Anchor -->
<header class="fixed top-0 w-full flex justify-between items-center px-margin py-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[32px]">verified_user</span>
<span class="font-headline-md text-headline-md font-bold text-primary">Fidelity Secure</span>
</div>
<div class="flex gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-variant transition-colors p-xs rounded-full">help_outline</button>
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-variant transition-colors p-xs rounded-full">dark_mode</button>
</div>
</header>
<!-- Login Container -->
<section class="w-full max-w-[440px]">
<div class="glass-effect rounded-xl p-xl shadow-sm border border-outline-variant/30 flex flex-col gap-lg">
<div class="space-y-xs">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Chào mừng trở lại</h1>
<p class="text-on-surface-variant font-body-md">Vui lòng đăng nhập để tiếp tục truy cập hệ thống bảo mật.</p>
</div>
<form class="flex flex-col gap-md" id="loginForm">
<!-- Username Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="username">Tên đăng nhập</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-md pl-xl pr-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="username" placeholder="Nhập tên người dùng" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Mật khẩu</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-md pl-xl pr-xl text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md text-outline hover:text-on-surface transition-colors flex items-center" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-[18px] py-md rounded-lg mt-md shadow-sm active:scale-[0.98] transition-all hover:brightness-110 flex justify-center items-center gap-base" type="submit">
<span>Đăng nhập</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<div class="flex items-center gap-md py-base">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-on-surface-variant font-label-md">Hoặc đăng nhập với</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-base border border-outline-variant rounded-lg py-base hover:bg-surface-variant transition-colors font-label-md">
<svg class="w-5 h-5" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path></svg>
                        Google
                    </button>
<button class="flex items-center justify-center gap-base border border-outline-variant rounded-lg py-base hover:bg-surface-variant transition-colors font-label-md">
<svg class="w-5 h-5" viewbox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"></path></svg>
                        Facebook
                    </button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-lg text-center flex flex-col gap-base">
<p class="text-on-surface-variant font-label-md">
                    Chưa có tài khoản? 
                    <a class="text-primary font-bold hover:underline ml-xs transition-all" href="#">Đăng ký ngay</a>
</p>
<div class="flex justify-center gap-md mt-sm">
<a class="text-outline text-[12px] hover:text-on-surface transition-colors" href="#">Điều khoản</a>
<a class="text-outline text-[12px] hover:text-on-surface transition-colors" href="#">Bảo mật</a>
<a class="text-outline text-[12px] hover:text-on-surface transition-colors" href="#">Hỗ trợ</a>
</div>
</div>
</section>
</main>
<!-- Side Decoration (Asymmetric Element) -->
<div class="fixed right-[-5%] top-[10%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed left-[-5%] bottom-[10%] w-[300px] h-[300px] bg-tertiary/10 rounded-full blur-[80px] pointer-events-none"></div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        // Form interaction micro-interaction
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            // Simulating a secure login delay
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Thành công</span>';
                btn.classList.replace('bg-primary-container', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-primary-container');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });

        // Focus ring enhancement
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#b1c5ff';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#8c90a1';
            });
        });
    </script>
</body></html>
