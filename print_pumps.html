<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Tem Mã QR Code Máy Bơm | BanDienScan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <style>
        :root {
            --border: #cbd5e1;
            --text: #0f172a;
            --muted: #64748b;
            --blue: #0284c7;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #f8fafc;
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 20px;
            background: white;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
        }
        .title { font-weight: 800; font-size: 1.1rem; }
        .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
        .controls { display: flex; gap: 8px; align-items: center; }
        button, a.btn-back {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88rem;
        }
        button.btn-primary-custom {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
            cursor: pointer;
        }
        a.btn-back {
            background: white;
            color: var(--text);
        }
        /* === SHEET GRID === */
        .sheet {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* === LABEL CARD (vertical stack) === */
        .label {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 12px 12px 28px 12px;
            background: white;
            border: 2px solid #1e293b;
            border-radius: 14px;
            break-inside: avoid;
            position: relative;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .label.unselected {
            border-color: #cbd5e1;
            background: #f8fafc;
            opacity: 0.5;
        }
        .label.unselected .qr { opacity: 0.2; }

        /* === QR BLOCK (top, full-width) === */
        .qr-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        .qr {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
        }
        .qr canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* === INFO BLOCK (bottom) === */
        .info-block {
            display: flex;
            flex-direction: column;
            gap: 0;
            flex: 1;
        }
        .name {
            font-size: 0.95rem;
            line-height: 1.25;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 5px;
        }
        .meta {
            color: var(--muted);
            font-size: 0.78rem;
            line-height: 1.35;
            margin-top: 2px;
        }
        .meta strong { color: #0f172a; }
        .uid {
            margin-top: 8px;
            display: inline-block;
            padding: 3px 9px;
            border-radius: 5px;
            background: #0f172a;
            color: white;
            font-family: Consolas, monospace;
            font-size: 0.78rem;
            font-weight: 800;
        }
        .type-badge {
            display: inline-block;
            color: #0369a1;
            background: #e0f2fe;
            border: 1px solid #bae6fd;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .url {
            position: absolute;
            bottom: 6px;
            left: 12px;
            right: 12px;
            font-size: 7.5px;
            color: #94a3b8;
            overflow-wrap: anywhere;
            border-top: 1px dashed #e2e8f0;
            padding-top: 4px;
            font-family: Consolas, monospace;
        }

        @media print {
            .no-print { display: none !important; }
        }

        /* A4: 190mm × 277mm usable (margin 10mm)
           2 cols × 2 rows, gap 8mm
           → each label: 91mm × 134.5mm
           → QR target: ~83mm
        */
        @page { size: A4 portrait; margin: 10mm; }
        @media print {
            body { background: white !important; }
            .toolbar { display: none !important; }
            .sheet {
                max-width: none !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                gap: 8mm !important;
                grid-template-columns: repeat(2, 1fr) !important;
            }
            .label {
                height: 134mm !important;
                border: 1.5px solid #000 !important;
                border-radius: 6px !important;
                padding: 5mm 5mm 10mm 5mm !important;
                page-break-inside: avoid !important;
            }
            .label.unselected { display: none !important; }
            .qr-block { margin-bottom: 4mm !important; }
            .name { font-size: 8pt !important; }
            .meta { font-size: 7pt !important; }
            .uid { font-size: 7pt !important; padding: 2px 6px !important; }
            .url { font-size: 6pt !important; bottom: 4px !important; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div>
            <div class="title">🖨️ In Tem QR Code Máy Bơm</div>
            <div class="sub" id="summary">Đang tải danh sách bơm...</div>
        </div>
        <div class="controls">
            <button class="btn btn-outline-secondary btn-sm" onclick="toggleAll(true)"><i class="bi bi-check-all"></i> Chọn tất cả</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="toggleAll(false)"><i class="bi bi-x"></i> Bỏ chọn tất cả</button>
            <a href="index.html" class="btn-back"><i class="bi bi-house"></i> Trang chủ</a>
            <button class="btn-primary-custom" onclick="window.print()"><i class="bi bi-printer"></i> In tem QR</button>
        </div>
    </div>
    <main class="sheet" id="sheet"></main>

    <script>
        let PUMP_DICT = JSON.parse(localStorage.getItem('bds_pumps_dict')) || {
            "1": { id: 1, name: "Bơm 160kW hút từ hồ lán trại", flowRate: 244, source: "Hồ lán trại", settingId: "PUMP-160KW-LAN-TRAI", monitorOnly: true },
            "2": { id: 2, name: "Bơm hoả tiễn 18,5kW", flowRate: 27.95, source: "Hồ lán trại", settingId: "PUMP-HOATIEN-18_5KW" },
            "3": { id: 3, name: "Bơm hoả tiễn 30kW", flowRate: 45.33, source: "Hồ lán trại", settingId: "PUMP-HOATIEN-30KW" },
            "4": { id: 4, name: "Bơm hoả tiễn 22kW", flowRate: 45.33, source: "Hồ lán trại", settingId: "PUMP-HOATIEN-22KW" },
            "5": { id: 5, name: "Bơm LK1", flowRate: 1, source: "Giếng khoan LK1", settingId: "PUMP-LK1" },
            "6": { id: 6, name: "Bơm LK2", flowRate: 2, source: "Giếng khoan LK2", settingId: "PUMP-LK2" },
            "7": { id: 7, name: "Bơm LK3", flowRate: 3, source: "Giếng khoan LK3", settingId: "PUMP-LK3" },
            "8": { id: 8, name: "Bơm LK4", flowRate: 4, source: "Giếng khoan LK4", settingId: "PUMP-LK4" },
            "9": { id: 9, name: "Bơm LK5", flowRate: 5, source: "Giếng khoan LK5", settingId: "PUMP-LK5" },
            "10": { id: 10, name: "Bơm LK6", flowRate: 6, source: "Giếng khoan LK6", settingId: "PUMP-LK6" },
            "11": { id: 11, name: "Bơm LK7", flowRate: 7, source: "Giếng khoan LK7", settingId: "PUMP-LK7" },
            "12": { id: 12, name: "Bơm LK8", flowRate: 8, source: "Giếng khoan LK8", settingId: "PUMP-LK8" },
            "13": { id: 13, name: "Bơm LK9", flowRate: 9, source: "Giếng khoan LK9", settingId: "PUMP-LK9" },
            "14": { id: 14, name: "Bơm LK10", flowRate: 10, source: "Giếng khoan LK10", settingId: "PUMP-LK10" },
            "15": { id: 15, name: "Bơm LK11", flowRate: 11, source: "Giếng khoan LK11", settingId: "PUMP-LK11" },
            "16": { id: 16, name: "Bơm LK12", flowRate: 12, source: "Giếng khoan LK12", settingId: "PUMP-LK12" },
            "17": { id: 17, name: "Bơm LK13", flowRate: 1, source: "Giếng khoan LK13", settingId: "PUMP-LK13" },
            "18": { id: 18, name: "Bơm LK14", flowRate: 1, source: "Giếng khoan LK14", settingId: "PUMP-LK14" },
            "19": { id: 19, name: "Bơm LK15", flowRate: 1, source: "Giếng khoan LK15", settingId: "PUMP-LK15" },
            "20": { id: 20, name: "Bơm hoả tiễn 30kW số 01", flowRate: 86, source: "Hồ trung tâm", settingId: "PUMP-HO-TRUNG-TAM-01" },
            "21": { id: 21, name: "Bơm hoả tiễn 30kW số 02", flowRate: 86, source: "Hồ trung tâm", settingId: "PUMP-HO-TRUNG-TAM-02" },
            "24": { id: 24, name: "Bơm 160kW số 01 hút từ hồ nước mặt ngoài sân", flowRate: 154, source: "Hồ ngoài sân (nước suối)", settingId: "PUMP-SUOI-CUN-160KW", monitorOnly: true },
            "25": { id: 25, name: "Bơm tưới cỏ hồ trung tâm (rainbird)", flowRate: 0, source: "Hồ trung tâm", settingId: "PUMP-HO-TRUNG-TAM-RAINBIRD" },
            "26": { id: 26, name: "Bơm tưới cỏ hồ 16-17 (rainbird)", flowRate: 0, source: "Hồ 16-17", settingId: "PUMP-HO-16-17-RAINBIRD" }
        };

        function renderLabels() {
            const list = Object.values(PUMP_DICT);
            const sheet = document.getElementById("sheet");
            sheet.innerHTML = "";

            list.forEach((pump, idx) => {
                const targetUrl = `https://bandien.github.io/scan/checkbom/?pumpId=${pump.id}`;
                
                const label = document.createElement("section");
                label.className = "label";
                label.id = `label-${pump.id}`;
                label.innerHTML = `
                    <div class="position-absolute top-0 end-0 p-2 no-print" style="z-index:2;">
                        <input type="checkbox" class="form-check-input card-checkbox" checked data-id="${pump.id}" onchange="toggleSelect(${pump.id})" style="transform: scale(1.5); cursor: pointer;">
                    </div>

                    <div class="qr-block">
                        <div class="qr" id="qr-${idx}"></div>
                        <span class="type-badge">${pump.monitorOnly ? 'Chỉ giám sát' : 'Điều khiển'}</span>
                    </div>

                    <div class="info-block">
                        <div class="name">${escapeHtml(pump.name)}</div>
                        <div class="meta"><i class="bi bi-droplet-fill text-primary me-1"></i>Nguồn: <strong>${escapeHtml(pump.source)}</strong></div>
                        <div class="meta"><i class="bi bi-lightning-fill text-warning me-1"></i>Công suất: <strong>${escapeHtml(pump.flowRate)}</strong> m³/h</div>
                        <div class="meta"><i class="bi bi-cpu text-info me-1"></i>NA111: <strong>${escapeHtml(pump.na111Id || 'N/A')}</strong> &nbsp;|&nbsp; <i class="bi bi-hdd-network text-success me-1"></i>Modbus: <strong>${escapeHtml(pump.modbusId || 'N/A')}</strong></div>
                        <span class="uid">PUMP_${pump.id}</span>
                    </div>

                    <div class="url">/checkbom/?pumpId=${pump.id}</div>
                `;
                sheet.appendChild(label);

                QRCode.toCanvas(document.createElement("canvas"), targetUrl, {
                    width: 320,
                    margin: 1,
                    color: { dark: "#0f172a", light: "#ffffff" },
                }, (err, canvas) => {
                    const target = document.getElementById(`qr-${idx}`);
                    if (!target) return;
                    target.innerHTML = "";
                    if (err) target.textContent = "QR lỗi";
                    else {
                        canvas.style.width = "100%";
                        canvas.style.height = "100%";
                        canvas.style.display = "block";
                        target.appendChild(canvas);
                    }
                });
            });
            updateSummary();
        }

        function toggleSelect(id) {
            const label = document.getElementById(`label-${id}`);
            const checkbox = label.querySelector('.card-checkbox');
            if (checkbox.checked) {
                label.classList.remove('unselected');
            } else {
                label.classList.add('unselected');
            }
            updateSummary();
        }

        function toggleAll(status) {
            const checkboxes = document.querySelectorAll('.card-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = status;
                const id = cb.getAttribute('data-id');
                const label = document.getElementById(`label-${id}`);
                if (status) {
                    label.classList.remove('unselected');
                } else {
                    label.classList.add('unselected');
                }
            });
            updateSummary();
        }

        function updateSummary() {
            const total = Object.values(PUMP_DICT).length;
            const selected = document.querySelectorAll('.card-checkbox:checked').length;
            document.getElementById("summary").textContent = `Đã chọn ${selected}/${total} máy bơm - Căn chỉnh 4 tem/A4 (2x2)`;
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, ch => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;",
            }[ch]));
        }

        async function loadServerPumps() {
            try {
                const res = await bdsApiFetch('getPumps');
                if (res.status === "success" && Array.isArray(res.data) && res.data.length > 0) {
                    const newDict = {};
                    res.data.forEach(p => {
                        newDict[p.id] = p;
                    });
                    PUMP_DICT = newDict;
                    localStorage.setItem('bds_pumps_dict', JSON.stringify(PUMP_DICT));
                }
            } catch (err) {
                console.error("Lỗi nạp danh sách bơm từ server:", err);
            }
        }

        function loadQrLibraryAndRender() {
            if (typeof QRCode !== 'undefined') {
                renderLabels();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/qrcode@1.5.4/build/qrcode.min.js';
            script.onload = () => {
                renderLabels();
            };
            script.onerror = () => {
                document.getElementById('sheet').innerHTML = '<div class="alert alert-danger text-center m-4">Không tải được thư viện tạo mã QR. Vui lòng kiểm tra kết nối mạng.</div>';
            };
            document.head.appendChild(script);
        }

        window.addEventListener("load", async () => {
            await loadServerPumps();
            loadQrLibraryAndRender();
        });
    </script>
</body>
</html>
